# Kerrigan configuration file
# See doc/kerrigan-conf.md for full documentation.
# Lines beginning with # are comments.

# --- Network ---

# Run as a daemon (background process). Default: 0
#daemon=1

# Accept incoming connections. Default: 1
#listen=1

# Run a server (accept RPC commands). Default: 0 (unless -daemon is set)
#server=1

# Use testnet instead of mainnet. Default: 0
#testnet=0

# --- RPC ---

# RPC username and password. Required if server=1.
#rpcuser=YOUR_USERNAME
#rpcpassword=YOUR_PASSWORD

# Allow RPC connections from this IP. Default: 127.0.0.1
# Use multiple rpcallowip= lines for multiple IPs.
#rpcallowip=127.0.0.1

# Default RPC port. Mainnet: 7121, Testnet: 17121
#rpcport=7121

# --- Per-Algorithm RPC Ports (Pool Mining) ---
# Each rpcalgoport binding creates a dedicated RPC listener for one mining
# algorithm. Pool software connects to the port for its algo, and
# getblocktemplate automatically returns templates for that algorithm.
# All algo ports bind to loopback only (127.0.0.1).
#
# Format: rpcalgoport=ALGO:PORT
# Algorithms: x11, kawpow, equihash200, equihash192
#
#rpcalgoport=x11:1100
#rpcalgoport=kawpow:5700
#rpcalgoport=equihash200:2009
#rpcalgoport=equihash192:1927

# --- Indexing ---

# Maintain a full transaction index. Required for block explorers and
# some pool software. Default: 0
#txindex=1

# Maintain address-based index. Required for address lookups. Default: 0
#addressindex=1

# --- Connections ---

# Maximum number of inbound+outbound connections. Default: 125
#maxconnections=125

# Add a node to connect to and attempt to keep the connection open.
#addnode=seed1.kerrigan.network
#addnode=seed2.kerrigan.network

# --- Masternode ---

# Masternode BLS private key (set only on masternode servers).
#masternodeblsprivkey=

# --- Wallet ---

# Disable wallet functionality entirely (for pool/relay nodes). Default: 0
#disablewallet=1

# --- Sapling (Privacy) ---

# Sapling shielded transactions activate at block 500 on mainnet.
# No configuration needed -- activation is consensus-enforced.

# --- Logging ---

# Print to console instead of debug.log. Default: 0
#printtoconsole=0

# Enable debug logging categories. Use debug=1 for all, or specific:
#   net, tor, mempool, http, bench, proxy, prune, rand, zmq, walletdb,
#   rpc, estimatefee, addrman, selectcoins, reindex, cmpctblock,
#   gobject, mnpayments, mnsync, instantsend, llmq, chainlocks
#debug=0
