name: Build Kerrigan macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: brew install automake libtool pkg-config

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install cxxbridge
        run: cargo install cxxbridge-cmd --version 1.0.186

      - name: Cache depends
        uses: actions/cache@v5
        with:
          path: |
            depends/built
            depends/sources
            depends/aarch64-apple-darwin
          key: depends-macos-arm64-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: depends-macos-arm64-

      - name: Build depends
        run: |
          cd depends
          make HOST=aarch64-apple-darwin -j$(sysctl -n hw.ncpu)

      - name: Autogen
        run: ./autogen.sh

      - name: Configure
        run: |
          ./configure \
            --prefix=$PWD/depends/aarch64-apple-darwin \
            --disable-tests \
            --disable-bench \
            --without-libs \
            ARFLAGS="cr"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu) RANLIB="ranlib -no_warning_for_no_symbols"

      - name: Verify binaries
        run: |
          echo "=== Checking all binaries ==="
          ls -la src/kerrigand src/kerrigan-cli src/kerrigan-tx src/kerrigan-wallet src/kerrigan-util
          test -f src/qt/kerrigan-qt && echo "Qt wallet: OK" || { echo "ERROR: kerrigan-qt not built"; exit 1; }
          ./src/kerrigand --version

      - name: Extract version
        id: version
        run: |
          MAJOR=$(grep '_CLIENT_VERSION_MAJOR' configure.ac | head -1 | grep -o '[0-9]*')
          MINOR=$(grep '_CLIENT_VERSION_MINOR' configure.ac | head -1 | grep -o '[0-9]*')
          BUILD=$(grep '_CLIENT_VERSION_BUILD' configure.ac | head -1 | grep -o '[0-9]*')
          echo "full=${MAJOR}.${MINOR}.${BUILD}" >> $GITHUB_OUTPUT

      - name: Create release package (tar.gz)
        run: |
          VERSION=${{ steps.version.outputs.full }}
          RELEASE_DIR="kerrigan-${VERSION}-arm64-apple-darwin"
          mkdir -p release/${RELEASE_DIR}/bin
          cp src/kerrigand src/kerrigan-cli src/kerrigan-tx \
             src/kerrigan-wallet src/kerrigan-util \
             src/qt/kerrigan-qt \
             release/${RELEASE_DIR}/bin/
          strip release/${RELEASE_DIR}/bin/*
          cd release
          tar -czvf ${RELEASE_DIR}.tar.gz ${RELEASE_DIR}/
          echo "SHA256: $(shasum -a 256 ${RELEASE_DIR}.tar.gz)"

      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.full }}
          DMG_NAME="kerrigan-${VERSION}-arm64-apple-darwin.dmg"
          DMG_DIR="release/dmg"
          APP="${DMG_DIR}/Kerrigan-Qt.app"
          mkdir -p "${APP}/Contents/MacOS"
          mkdir -p "${APP}/Contents/Resources"
          cp src/qt/kerrigan-qt "${APP}/Contents/MacOS/Kerrigan-Qt"
          strip "${APP}/Contents/MacOS/Kerrigan-Qt"
          cp share/pixmaps/kerrigan.icns "${APP}/Contents/Resources/kerrigan.icns" 2>/dev/null || true
          cat > "${APP}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Kerrigan-Qt</string>
            <key>CFBundleIconFile</key>
            <string>kerrigan.icns</string>
            <key>CFBundleIdentifier</key>
            <string>org.kerrigan.Kerrigan-Qt</string>
            <key>CFBundleName</key>
            <string>Kerrigan Core</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          hdiutil create -volname "Kerrigan Core" -srcfolder "${DMG_DIR}" \
            -ov -format UDZO "release/${DMG_NAME}"
          echo "SHA256: $(shasum -a 256 release/${DMG_NAME})"

      - name: Upload tar.gz
        uses: actions/upload-artifact@v5
        with:
          name: kerrigan-${{ steps.version.outputs.full }}-arm64-apple-darwin.tar.gz
          path: release/*.tar.gz

      - name: Upload DMG
        uses: actions/upload-artifact@v5
        with:
          name: kerrigan-${{ steps.version.outputs.full }}-arm64-apple-darwin.dmg
          path: release/*.dmg
