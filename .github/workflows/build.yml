name: Build Kerrigan macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: brew install automake libtool pkg-config

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install cxxbridge
        run: cargo install cxxbridge-cmd --version 1.0.186

      - name: Cache depends
        uses: actions/cache@v5
        with:
          path: |
            depends/built
            depends/sources
            depends/x86_64-apple-darwin
          key: depends-macos-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: depends-macos-

      - name: Build depends
        run: |
          cd depends
          make HOST=x86_64-apple-darwin -j$(sysctl -n hw.ncpu)

      - name: Autogen
        run: ./autogen.sh

      - name: Configure
        run: |
          ./configure \
            --prefix=$PWD/depends/x86_64-apple-darwin \
            --disable-tests \
            --disable-bench \
            ARFLAGS="cr"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu) RANLIB="ranlib -no_warning_for_no_symbols"

      - name: Smoke test
        run: ./src/kerrigand --version

      - name: Extract version
        id: version
        run: |
          MAJOR=$(grep '_CLIENT_VERSION_MAJOR' configure.ac | head -1 | grep -o '[0-9]*')
          MINOR=$(grep '_CLIENT_VERSION_MINOR' configure.ac | head -1 | grep -o '[0-9]*')
          BUILD=$(grep '_CLIENT_VERSION_BUILD' configure.ac | head -1 | grep -o '[0-9]*')
          echo "full=${MAJOR}.${MINOR}.${BUILD}" >> $GITHUB_OUTPUT

      - name: Create release package
        run: |
          VERSION=${{ steps.version.outputs.full }}
          RELEASE_DIR="kerrigan-${VERSION}-x86_64-apple-darwin"
          mkdir -p release/${RELEASE_DIR}/bin
          cp src/kerrigand src/kerrigan-cli src/kerrigan-tx \
             src/kerrigan-wallet src/kerrigan-util \
             release/${RELEASE_DIR}/bin/
          if [ -f src/qt/kerrigan-qt ]; then
            cp src/qt/kerrigan-qt release/${RELEASE_DIR}/bin/
          fi
          strip release/${RELEASE_DIR}/bin/*
          cd release
          tar -czvf ${RELEASE_DIR}.tar.gz ${RELEASE_DIR}/
          shasum -a 256 ${RELEASE_DIR}.tar.gz > ${RELEASE_DIR}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: kerrigan-${{ steps.version.outputs.full }}-x86_64-apple-darwin
          path: |
            release/*.tar.gz
            release/*.sha256
