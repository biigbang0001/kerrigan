name: Build Kerrigan macOS

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 180
    strategy:
      matrix:
        arch: [arm64-apple-darwin, x86_64-apple-darwin]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set host triple
        id: host
        run: |
          if [ "${{ matrix.arch }}" = "arm64-apple-darwin" ]; then
            echo "triple=aarch64-apple-darwin" >> $GITHUB_OUTPUT
            echo "rust_target=aarch64-apple-darwin" >> $GITHUB_OUTPUT
            echo "display=arm64-apple-darwin" >> $GITHUB_OUTPUT
          else
            echo "triple=x86_64-apple-darwin" >> $GITHUB_OUTPUT
            echo "rust_target=x86_64-apple-darwin" >> $GITHUB_OUTPUT
            echo "display=x86_64-apple-darwin" >> $GITHUB_OUTPUT
          fi

      - name: Install build dependencies
        run: brew install automake libtool pkg-config

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add Rust cross-compile target
        if: matrix.arch == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Install cxxbridge
        run: cargo install cxxbridge-cmd --version 1.0.186

      - name: Cache depends
        uses: actions/cache@v5
        with:
          path: |
            depends/built
            depends/sources
            depends/${{ steps.host.outputs.triple }}
          key: depends-macos-${{ matrix.arch }}-${{ hashFiles('depends/packages/*.mk') }}
          restore-keys: depends-macos-${{ matrix.arch }}-

      - name: Build depends
        run: |
          cd depends
          make HOST=${{ steps.host.outputs.triple }} -j$(sysctl -n hw.ncpu)

      - name: Autogen
        run: ./autogen.sh

      - name: Configure
        run: |
          ./configure \
            --prefix=$PWD/depends/${{ steps.host.outputs.triple }} \
            --disable-tests \
            --disable-bench \
            ARFLAGS="cr"

      - name: Build
        run: make -j$(sysctl -n hw.ncpu) RANLIB="ranlib -no_warning_for_no_symbols"

      - name: Smoke test
        if: matrix.arch == 'arm64-apple-darwin'
        run: ./src/kerrigand --version

      - name: Extract version
        id: version
        run: |
          MAJOR=$(grep '_CLIENT_VERSION_MAJOR' configure.ac | head -1 | grep -o '[0-9]*')
          MINOR=$(grep '_CLIENT_VERSION_MINOR' configure.ac | head -1 | grep -o '[0-9]*')
          BUILD=$(grep '_CLIENT_VERSION_BUILD' configure.ac | head -1 | grep -o '[0-9]*')
          echo "full=${MAJOR}.${MINOR}.${BUILD}" >> $GITHUB_OUTPUT

      - name: Create release package (tar.gz)
        run: |
          VERSION=${{ steps.version.outputs.full }}
          DISPLAY=${{ steps.host.outputs.display }}
          RELEASE_DIR="kerrigan-${VERSION}-${DISPLAY}"
          mkdir -p release/${RELEASE_DIR}/bin
          cp src/kerrigand src/kerrigan-cli src/kerrigan-tx \
             src/kerrigan-wallet src/kerrigan-util \
             release/${RELEASE_DIR}/bin/
          if [ -f src/qt/kerrigan-qt ]; then
            cp src/qt/kerrigan-qt release/${RELEASE_DIR}/bin/
          fi
          strip release/${RELEASE_DIR}/bin/*
          cd release
          tar -czvf ${RELEASE_DIR}.tar.gz ${RELEASE_DIR}/
          shasum -a 256 ${RELEASE_DIR}.tar.gz > ${RELEASE_DIR}.tar.gz.sha256

      - name: Create DMG
        if: hashFiles('src/qt/kerrigan-qt') != ''
        run: |
          VERSION=${{ steps.version.outputs.full }}
          DISPLAY=${{ steps.host.outputs.display }}
          APP_NAME="Kerrigan-Qt"
          DMG_NAME="kerrigan-${VERSION}-${DISPLAY}.dmg"
          DMG_DIR="release/dmg"
          mkdir -p "${DMG_DIR}/${APP_NAME}.app/Contents/MacOS"
          mkdir -p "${DMG_DIR}/${APP_NAME}.app/Contents/Resources"
          cp src/qt/kerrigan-qt "${DMG_DIR}/${APP_NAME}.app/Contents/MacOS/Kerrigan-Qt"
          strip "${DMG_DIR}/${APP_NAME}.app/Contents/MacOS/Kerrigan-Qt"
          if [ -f share/pixmaps/kerrigan.icns ]; then
            cp share/pixmaps/kerrigan.icns "${DMG_DIR}/${APP_NAME}.app/Contents/Resources/kerrigan.icns"
          fi
          cat > "${DMG_DIR}/${APP_NAME}.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Kerrigan-Qt</string>
            <key>CFBundleIconFile</key>
            <string>kerrigan.icns</string>
            <key>CFBundleIdentifier</key>
            <string>org.kerrigan.Kerrigan-Qt</string>
            <key>CFBundleName</key>
            <string>Kerrigan Core</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.version.outputs.full }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.15</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          hdiutil create -volname "Kerrigan Core" -srcfolder "${DMG_DIR}" \
            -ov -format UDZO "release/${DMG_NAME}"
          cd release
          shasum -a 256 ${DMG_NAME} > ${DMG_NAME}.sha256

      - name: Upload tar.gz
        uses: actions/upload-artifact@v5
        with:
          name: kerrigan-${{ steps.version.outputs.full }}-${{ steps.host.outputs.display }}-tar
          path: |
            release/*.tar.gz
            release/*.tar.gz.sha256

      - name: Upload DMG
        if: hashFiles('release/*.dmg') != ''
        uses: actions/upload-artifact@v5
        with:
          name: kerrigan-${{ steps.version.outputs.full }}-${{ steps.host.outputs.display }}-dmg
          path: |
            release/*.dmg
            release/*.dmg.sha256
